# scribi-agent SealedSecret manager
#
# Grants the `scribi-agent` ServiceAccount full CRUD on the `sealedsecrets`
# CRD (bitnami.com) within the `scribi` namespace. The built-in `admin`
# ClusterRole bound in `scribi-agent-admin.yaml` does NOT include this CRD
# because the SealedSecret resource is not labeled for admin-aggregation,
# so an explicit binding is required.
#
# The reusable ClusterRole below is namespaced via RoleBinding (not
# ClusterRoleBinding) so it stays scoped to the `scribi` namespace.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-sealed-secret-manager
  labels:
    app.kubernetes.io/managed-by: homelab
    app.kubernetes.io/component: agent-rbac
rules:
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scribi-agent-sealed-secret-manager
  namespace: scribi
  labels:
    app.kubernetes.io/managed-by: homelab
    app.kubernetes.io/component: agent-rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-sealed-secret-manager
subjects:
  - kind: ServiceAccount
    name: scribi-agent
    namespace: scribi
