# PAI Workflow RBAC
#
# Grants Argo Workflows pods in the pai namespace permission to create
# workflowtaskresults (required by Argo >= 3.3 for task result reporting).
#
# The workflows run as the default service account (no serviceAccountName set
# in WorkflowTemplates), so this RoleBinding gives the default SA the same
# permissions as the pai-workflow-runner SA.

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pai-workflow-default-sa
  namespace: pai
subjects:
- kind: ServiceAccount
  name: default
  namespace: pai
roleRef:
  kind: Role
  name: pai-workflow-runner
  apiGroup: rbac.authorization.k8s.io
