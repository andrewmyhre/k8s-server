# Agent Secret Reader RBAC
#
# Grants least-privilege secret access to agents running in-cluster.
# Pattern: one ClusterRole (reusable) + per-namespace ServiceAccount + RoleBinding.
# Agents authenticate as the "agent" ServiceAccount in their own namespace and can
# only read secrets within that namespace — no cross-namespace access.
#
# To use from a pod spec:
#   serviceAccountName: agent

---
# Reusable ClusterRole — grants only "get" and "list" on secrets.
# Bound via RoleBinding (not ClusterRoleBinding) so it is always namespace-scoped.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-secret-reader
  labels:
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/component: agent-rbac
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

---
# cloudflare namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent
  namespace: cloudflare
  labels:
    app.kubernetes.io/component: agent-rbac
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-secret-reader
  namespace: cloudflare
  labels:
    app.kubernetes.io/component: agent-rbac
subjects:
  - kind: ServiceAccount
    name: agent
    namespace: cloudflare
roleRef:
  kind: ClusterRole
  name: agent-secret-reader
  apiGroup: rbac.authorization.k8s.io

