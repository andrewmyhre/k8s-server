---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: huddle-api-secrets
  namespace: huddle
spec:
  encryptedData:
    ANTHROPIC_API_KEY: 
    ELEVENLABS_API_KEY: 
    VAPID_PRIVATE_KEY: 
    VAPID_PUBLIC_KEY: 
    VAPID_SUBJECT: 
  template:
    metadata:
      annotations:
        meta.helm.sh/release-name: huddle
        meta.helm.sh/release-namespace: huddle
      labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: huddle
        helm.sh/chart: huddle-0.1.0
      name: huddle-api-secrets
      namespace: huddle
    type: Opaque
