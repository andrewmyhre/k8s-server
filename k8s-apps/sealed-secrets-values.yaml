# Bitnami Sealed Secrets controller
# https://github.com/bitnami-labs/sealed-secrets
#
# Installed in kube-system namespace (default, so kubeseal finds it automatically).

fullnameOverride: sealed-secrets-controller

# Single-node homelab — one replica is fine
replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi
