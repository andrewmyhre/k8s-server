replicaCount: 1

config:
  inCluster: true
  inClusterContextName: "main"

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

service:
  type: ClusterIP
  port: 4466

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: headlamp.primera.rodeo
      paths:
        - path: /
          type: Prefix
