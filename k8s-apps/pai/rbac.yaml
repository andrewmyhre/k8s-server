apiVersion: v1
kind: ServiceAccount
metadata:
  name: pai-workflow-runner
  namespace: pai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pai-workflow-runner
  namespace: pai
rules:
- apiGroups:
  - argoproj.io
  resources:
  - workflowtemplates
  verbs:
  - get
  - list
- apiGroups:
  - argoproj.io
  resources:
  - workflows
  verbs:
  - create
  - get
  - list
  - watch
  - delete
- apiGroups:
  - argoproj.io
  resources:
  - workflowtaskresults
  verbs:
  - create
  - patch
- apiGroups:
  - ''
  resources:
  - pods
  - pods/log
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pai-workflow-runner
  namespace: pai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pai-workflow-runner
subjects:
- kind: ServiceAccount
  name: pai-workflow-runner
  namespace: pai
