apiVersion: v1
data:
  Dockerfile: 'FROM cgr.dev/chainguard/wolfi-base

    RUN apk add --no-cache python-3 py3-pip aws-cli curl bash git nodejs-22 npm jq
    kubectl

    RUN pip install --no-cache-dir boto3 tabulate markdown requests

    RUN npm install -g @anthropic-ai/claude-code

    RUN echo ''''
    | base64 -d > /usr/local/bin/pai-module-runner.py

    RUN echo ''''
    | base64 -d > /usr/local/bin/send_ses.py'
  pai-module-runner.py: "#!/usr/bin/env python3\n\"\"\"\npai-module-runner: Reads\
    \ a .daily/prompt.md, gathers data sources,\ncalls Claude API, and writes AI-generated\
    \ output to the daily sections dir.\n\"\"\"\nimport sys, os, json, re, subprocess,\
    \ urllib.request, urllib.error\nfrom pathlib import Path\nfrom datetime import\
    \ date\n\ndef parse_frontmatter(content):\n    fm, body = {}, content\n    if\
    \ content.startswith('---'):\n        parts = content.split('---', 2)\n      \
    \  if len(parts) >= 3:\n            for line in parts[1].strip().split('\\n'):\n\
    \                if ':' in line:\n                    k, v = line.split(':', 1)\n\
    \                    fm[k.strip()] = v.strip().strip('\"').strip(\"'\")\n    \
    \        body = parts[2]\n    return fm, body\n\ndef gather_data_sources(body):\n\
    \    \"\"\"Read files referenced in ## Data Sources section.\"\"\"\n    context\
    \ = \"\"\n    match = re.search(r'## Data Sources\\n(.*?)(?=\\n## |\\Z)', body,\
    \ re.DOTALL)\n    if not match:\n        return context\n    for line in match.group(1).strip().split('\\\
    n'):\n        path_match = re.search(r'`([^`]+)`', line)\n        if not path_match:\n\
    \            continue\n        raw = path_match.group(1)\n        # Expand ~ and\
    \ /projects shorthand\n        expanded = raw.replace('~', os.path.expanduser('~'))\n\
    \        p = Path(expanded)\n        if p.exists():\n            context += f\"\
    \\n### {p.name}\\n{p.read_text()}\\n\"\n        else:\n            context +=\
    \ f\"\\n### {p.name}\\n(file not found: {expanded})\\n\"\n    return context\n\
    \ndef run_pre_commands(body):\n    \"\"\"Run commands in ## Commands section and\
    \ capture output as context.\"\"\"\n    context = \"\"\n    match = re.search(r'##\
    \ Commands\\n(.*?)(?=\\n## |\\Z)', body, re.DOTALL)\n    if not match:\n     \
    \   return context\n    for line in match.group(1).strip().split('\\n'):\n   \
    \     cmd_match = re.search(r'`([^`]+)`', line)\n        if not cmd_match:\n \
    \           continue\n        cmd = cmd_match.group(1)\n        try:\n       \
    \     out = subprocess.check_output(cmd, shell=True, stderr=subprocess.STDOUT,\
    \ timeout=30).decode()\n            context += f\"\\n### $ {cmd}\\n{out}\\n\"\n\
    \        except Exception as e:\n            context += f\"\\n### $ {cmd}\\n(error:\
    \ {e})\\n\"\n    return context\n\ndef call_claude(prompt, api_key):\n    payload\
    \ = {\n        \"model\": \"claude-sonnet-4-6\",\n        \"max_tokens\": 800,\n\
    \        \"messages\": [{\"role\": \"user\", \"content\": prompt}]\n    }\n  \
    \  req = urllib.request.Request(\n        \"https://api.anthropic.com/v1/messages\"\
    ,\n        data=json.dumps(payload).encode(),\n        headers={\n           \
    \ \"x-api-key\": api_key,\n            \"anthropic-version\": \"2023-06-01\",\n\
    \            \"content-type\": \"application/json\"\n        }\n    )\n    with\
    \ urllib.request.urlopen(req, timeout=60) as resp:\n        return json.loads(resp.read())[\"\
    content\"][0][\"text\"]\n\ndef main():\n    if len(sys.argv) < 2:\n        print(\"\
    Usage: pai-module-runner <path/to/.daily/prompt.md>\")\n        sys.exit(1)\n\n\
    \    prompt_file = Path(sys.argv[1])\n    if not prompt_file.exists():\n     \
    \   print(f\"Module not found: {prompt_file} — skipping\")\n        sys.exit(0)\n\
    \n    content = prompt_file.read_text()\n    fm, body = parse_frontmatter(content)\n\
    \n    name = fm.get('name', prompt_file.parent.parent.name)\n    order = fm.get('order',\
    \ '50').zfill(3)\n    active = fm.get('active', 'true').lower()\n\n    if active\
    \ == 'false':\n        print(f\"[{name}] inactive — skipping\")\n        sys.exit(0)\n\
    \n    # Check schedule\n    schedule = fm.get('schedule', 'always').lower()\n\
    \    today = date.today().strftime('%A').lower()\n    weekday = date.today().weekday()\
    \ < 5\n    if schedule == 'weekdays' and not weekday:\n        print(f\"[{name}]\
    \ not scheduled today ({today}) — skipping\")\n        sys.exit(0)\n    if schedule\
    \ not in ('always', 'weekdays') and today not in schedule.split(','):\n      \
    \  print(f\"[{name}] not scheduled today ({today}) — skipping\")\n        sys.exit(0)\n\
    \n    # Check expiry\n    expires = fm.get('expires', '')\n    if expires:\n \
    \       try:\n            exp = date.fromisoformat(expires)\n            if date.today()\
    \ > exp:\n                print(f\"[{name}] expired {expires} — skipping\")\n\
    \                sys.exit(0)\n        except ValueError:\n            pass\n\n\
    \    print(f\"[{name}] gathering data...\")\n    data_context = gather_data_sources(body)\n\
    \    cmd_context = run_pre_commands(body)\n    all_context = data_context + cmd_context\n\
    \n    prompt = f\"\"\"You are generating the \"{name}\" section of Andrew's daily\
    \ plan.\n\n{body}\n\n## Available Data\n{all_context if all_context.strip() else\
    \ \"(No data sources)\"}\n\n---\nToday is {date.today().strftime('%A, %B %-d,\
    \ %Y')}.\nGenerate only the section content following the Output Format above.\
    \ Be concise and actionable.\"\"\"\n\n    print(f\"[{name}] calling Claude...\"\
    )\n    api_key = os.environ.get('ANTHROPIC_API_KEY', '')\n    if not api_key:\n\
    \        print(\"ERROR: ANTHROPIC_API_KEY not set\")\n        sys.exit(1)\n\n\
    \    section = call_claude(prompt, api_key)\n\n    out_dir = Path('/tmp/pai-daily/sections')\n\
    \    out_dir.mkdir(parents=True, exist_ok=True)\n    slug = re.sub(r'[^a-z0-9]+',\
    \ '-', name.lower()).strip('-')\n    out_file = out_dir / f\"{order}-{slug}.md\"\
    \n    out_file.write_text(section)\n    print(f\"[{name}] written to {out_file}\
    \ ({len(section)} chars)\")\n\nif __name__ == '__main__':\n    main()\n"
  send_ses.py: "import json, sys, re, subprocess\n\nplan_file = sys.argv[1]\nwith\
    \ open(plan_file) as f:\n    content = f.read()\n\ndef md_to_html(text):\n   \
    \ try:\n        import markdown\n        return markdown.markdown(text, extensions=[\"\
    fenced_code\", \"tables\"])\n    except ImportError:\n        pass\n    # Fallback:\
    \ manual conversion of common patterns\n    text = re.sub(r\"^### (.+)$\", r\"\
    <h3>\\1</h3>\", text, flags=re.MULTILINE)\n    text = re.sub(r\"^## (.+)$\", \
    \ r\"<h2>\\1</h2>\", text, flags=re.MULTILINE)\n    text = re.sub(r\"^# (.+)$\"\
    ,   r\"<h1>\\1</h1>\", text, flags=re.MULTILINE)\n    text = re.sub(r\"\\*\\*(.+?)\\\
    *\\*\", r\"<strong>\\1</strong>\", text)\n    text = re.sub(r\"\\*(.+?)\\*\",\
    \     r\"<em>\\1</em>\", text)\n    text = re.sub(r\"`(.+?)`\",       r\"<code>\\\
    1</code>\", text)\n    text = re.sub(r\"^- \\[ \\] (.+)$\", r\"<li>&#9744; \\\
    1</li>\", text, flags=re.MULTILINE)\n    text = re.sub(r\"^- \\[x\\] (.+)$\",\
    \ r\"<li>&#9745; \\1</li>\", text, flags=re.MULTILINE)\n    text = re.sub(r\"\
    ^- (.+)$\",       r\"<li>\\1</li>\", text, flags=re.MULTILINE)\n    text = re.sub(r\"\
    ^---+$\", \"<hr>\", text, flags=re.MULTILINE)\n    text = re.sub(r\"\\n\\n+\"\
    , \"</p><p>\", text)\n    return \"<p>\" + text + \"</p>\"\n\nbody_html = md_to_html(content)\n\
    \nCSS = \"\"\"\nbody{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\"\
    ,Helvetica,Arial,sans-serif;\n     max-width:800px;margin:0 auto;padding:24px;color:#24292f;line-height:1.6}\n\
    h1{font-size:1.6em;border-bottom:2px solid #0969da;padding-bottom:8px;color:#0969da}\n\
    h2{font-size:1.2em;color:#1f2328;border-bottom:1px solid #d0d7de;padding-bottom:4px;margin-top:24px}\n\
    h3{font-size:1.05em;color:#1f2328}\ncode{background:#f6f8fa;padding:2px 6px;border-radius:4px;font-size:.9em}\n\
    pre{background:#f6f8fa;padding:12px;border-radius:6px;overflow-x:auto}\nhr{border:none;border-top:1px\
    \ solid #d0d7de;margin:20px 0}\nli{margin:4px 0}\nul{padding-left:24px}\nblockquote{border-left:3px\
    \ solid #0969da;margin:0;padding-left:12px;color:#57606a}\nstrong{color:#1f2328}\n\
    \"\"\"\n\nhtml = f\"\"\"<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"\
    UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"\
    >\n<style>{CSS}</style></head>\n<body>{body_html}</body></html>\"\"\"\n\ndate_str\
    \ = subprocess.check_output([\"date\", \"+%A, %B %-d\"]).decode().strip()\nmsg\
    \ = {\n    \"Subject\": {\"Data\": f\"Day Plan \\u2014 {date_str}\", \"Charset\"\
    : \"UTF-8\"},\n    \"Body\": {\"Html\": {\"Data\": html, \"Charset\": \"UTF-8\"\
    }}\n}\nwith open(\"/tmp/email-msg.json\", \"w\") as f:\n    json.dump(msg, f)\n\
    print(f\"Email message written ({len(html)} bytes HTML)\")\n"
kind: ConfigMap
metadata:
  name: pai-runner-dockerfile
  namespace: pai

