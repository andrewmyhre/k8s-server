apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  labels:
    pai.io/project: aws-account
    pai.io/workflow: weekly
  name: weekly-step-aws-account
  namespace: pai
spec:
  entrypoint: run
  templates:
  - name: run
    script:
      command:
      - bash
      env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            key: AWS_ACCESS_KEY_ID
            name: pai-aws-credentials
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            key: AWS_SECRET_ACCESS_KEY
            name: pai-aws-credentials
      - name: AWS_DEFAULT_REGION
        valueFrom:
          secretKeyRef:
            key: AWS_DEFAULT_REGION
            name: pai-aws-credentials
      image: 192.168.0.10:30500/pai-runner:latest
      source: "set -e\nOUT=/tmp/pai-weekly/sections/aws-account.md\nSCRIPTS=/home/andrew/.claude/skills/aws-cost-finops/scripts\n\
        \necho \"## aws-account / Weekly Cost Audit\" > $OUT\necho \"\" >> $OUT\n\
        echo \"**Run date:** $(date)\" >> $OUT\necho \"\" >> $OUT\n\necho \"### Unused\
        \ Resources\" >> $OUT\npython3 $SCRIPTS/find_unused_resources.py --region\
        \ us-east-1 2>&1 >> $OUT || echo \"Script error\" >> $OUT\n\necho \"\" >>\
        \ $OUT\necho \"### Cost Anomalies (7 days)\" >> $OUT\npython3 $SCRIPTS/cost_anomaly_detector.py\
        \ --days 7 --region us-east-1 2>&1 >> $OUT || echo \"Script error\" >> $OUT\n\
        \necho \"\" >> $OUT\necho \"### Rightsizing Opportunities\" >> $OUT\npython3\
        \ $SCRIPTS/rightsizing_analyzer.py --days 7 --region us-east-1 2>&1 >> $OUT\
        \ || echo \"Script error\" >> $OUT\n\n# Voice notification\ncurl -s -X POST\
        \ http://192.168.0.31:8888/notify \\\n  -H \"Content-Type: application/json\"\
        \ \\\n  -d '{\"message\": \"Weekly AWS cost audit section complete.\", \"\
        voice_id\": \"gJx1vCzNCD1EQHT212Ls\"}'\n"
      volumeMounts:
      - mountPath: /tmp/pai-daily
        name: workspace
  volumes:
  - hostPath:
      path: /tmp/pai-daily
      type: DirectoryOrCreate
    name: workspace

---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: daily-plan-step-k8s-server
  namespace: pai
  labels:
    pai.io/workflow: daily-plan
    pai.io/project: k8s-server
spec:
  entrypoint: run
  templates:
  - name: run
    script:
      image: 192.168.0.10:30500/pai-runner:latest
      imagePullPolicy: Always
      command: [python3, /usr/local/bin/pai-module-runner.py]
      args: [/projects/k8s-server/.daily/prompt.md]
      env:
      - name: ANTHROPIC_API_KEY
        valueFrom:
          secretKeyRef:
            name: pai-claude-api-key
            key: ANTHROPIC_API_KEY
      volumeMounts:
      - name: workspace
        mountPath: /tmp/pai-daily
      - name: projects
        mountPath: /projects
  volumes:
  - name: workspace
    hostPath:
      path: /tmp/pai-daily
      type: DirectoryOrCreate
  - name: projects
    hostPath:
      path: /home/andrew/projects
      type: Directory
