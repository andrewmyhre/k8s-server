apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: pai-daily-plan
  namespace: pai
spec:
  concurrencyPolicy: Forbid
  schedule: 30 6 * * 1-5
  startingDeadlineSeconds: 300
  timezone: America/New_York
  workflowSpec:
    entrypoint: daily-plan-dag
    serviceAccountName: pai-workflow-runner
    templates:
    - dag:
        tasks:
        - name: image-refresh
          template: refresh-runner-image
        - dependencies:
          - image-refresh
          name: init-workspace
          template: init-workspace-tpl
        - dependencies:
          - init-workspace
          name: discover-steps
          template: discover-daily-steps
        - arguments:
            parameters:
            - name: step-name
              value: '{{item}}'
          dependencies:
          - discover-steps
          name: run-project-steps
          template: invoke-project-step
          withParam: '{{tasks.discover-steps.outputs.result}}'
        - dependencies:
          - init-workspace
          name: generate-status
          template: generate-status-tpl
        - dependencies:
          - run-project-steps
          - generate-status
          name: aggregate-and-email
          template: aggregate-email-tpl
      name: daily-plan-dag
    - container:
        args:
        - --dockerfile=/workspace/Dockerfile
        - --context=dir:///workspace
        - --destination=192.168.0.10:30500/pai-runner:latest
        - --destination=192.168.0.10:30500/pai-runner:{{workflow.creationTimestamp.Y}}{{workflow.creationTimestamp.m}}{{workflow.creationTimestamp.d}}
        - --insecure
        - --skip-tls-verify
        image: gcr.io/kaniko-project/executor:latest
        volumeMounts:
        - mountPath: /workspace
          name: dockerfile-cm
      name: refresh-runner-image
    - container:
        args:
        - rm -rf /workspace/sections && mkdir -p /workspace/sections
        command:
        - sh
        - -c
        image: busybox:latest
        volumeMounts:
        - mountPath: /workspace
          name: workspace
      name: init-workspace-tpl
    - name: discover-daily-steps
      script:
        command:
        - bash
        image: 192.168.0.10:30500/pai-runner:latest
        source: "kubectl get workflowtemplates \\\n  -l pai.io/workflow=daily-plan\
          \ \\\n  -n pai \\\n  -o json | python3 -c \"\nimport json, sys\nitems =\
          \ json.load(sys.stdin).get('items', [])\nnames = [i['metadata']['name']\
          \ for i in items]\nprint(json.dumps(names))\n\"\n"
    - inputs:
        parameters:
        - name: step-name
      name: invoke-project-step
      script:
        command:
        - bash
        image: 192.168.0.10:30500/pai-runner:latest
        source: "set -e\nSTEP_NAME=\"{{inputs.parameters.step-name}}\"\necho \"Submitting\
          \ child workflow for: $STEP_NAME\"\n\nWF_MANIFEST=$(cat <<WFEOF\napiVersion:\
          \ argoproj.io/v1alpha1\nkind: Workflow\nmetadata:\n  generateName: step-${STEP_NAME}-\n\
          \  namespace: pai\nspec:\n  serviceAccountName: pai-workflow-runner\n  workflowTemplateRef:\n\
          \    name: ${STEP_NAME}\n  volumes:\n  - name: workspace\n    hostPath:\n\
          \      path: /tmp/pai-daily\n      type: DirectoryOrCreate\n  - name: projects\n\
          \    hostPath:\n      path: /home/andrew/projects\n      type: Directory\n\
          WFEOF\n)\n\nWF_NAME=$(echo \"$WF_MANIFEST\" | kubectl create -n pai -f -\
          \ -o jsonpath='{.metadata.name}')\necho \"Submitted: $WF_NAME\"\n\nwhile\
          \ true; do\n  PHASE=$(kubectl get workflow \"$WF_NAME\" -n pai -o jsonpath='{.status.phase}'\
          \ 2>/dev/null || echo \"Pending\")\n  echo \"[$STEP_NAME] phase: $PHASE\"\
          \n  case \"$PHASE\" in\n    Succeeded) echo \"OK $STEP_NAME succeeded\"\
          ; exit 0 ;;\n    Failed|Error) echo \"FAIL $STEP_NAME failed\"; exit 1 ;;\n\
          \    *) sleep 5 ;;\n  esac\ndone\n"
        volumeMounts:
        - mountPath: /tmp/pai-daily
          name: workspace
    - name: generate-status-tpl
      script:
        command:
        - python3
        image: 192.168.0.10:30500/pai-runner:latest
        source: |
          import os, re
          from pathlib import Path
          from datetime import date

          PROJECTS_DIR = Path('/projects')
          OUT_FILE = Path('/tmp/pai-daily/sections/000-project-status.md')

          project_data = []
          for daily_dir in sorted(PROJECTS_DIR.glob('*/.daily')):
              for prompt_file in sorted(daily_dir.glob('*.md')):
                  content = prompt_file.read_text()
                  fm = {}
                  if content.startswith('---'):
                      parts = content.split('---', 2)
                      if len(parts) >= 3:
                          for line in parts[1].strip().split('\n'):
                              if ':' in line:
                                  k, v = line.split(':', 1)
                                  fm[k.strip()] = v.strip().strip('"').strip("'")
                  name = fm.get('name', daily_dir.parent.name)
                  try:
                      order = int(fm.get('order', '50'))
                  except ValueError:
                      order = 50
                  active = fm.get('active', 'true').lower() == 'true'
                  expires = fm.get('expires', '')
                  if expires:
                      try:
                          from datetime import date as d
                          if d.today() > d.fromisoformat(expires):
                              active = False
                      except ValueError:
                          pass
                  if not active or order >= 50:
                      continue
                  project_dir = daily_dir.parent
                  status_line = ''
                  for fname in ('PROJECT.md', 'ROADMAP.md', 'README.md'):
                      p = project_dir / fname
                      if p.exists():
                          for line in p.read_text().split('\n'):
                              if '**Status:**' in line or 'Status:' in line:
                                  status_line = re.sub(r'\*\*Status:\*\*\s*', '', line).strip()
                                  status_line = re.sub(r'Status:\s*', '', status_line).strip()
                                  break
                          if status_line:
                              break
                  project_data.append((order, name, status_line or '—'))

          project_data.sort()
          today = date.today().strftime('%A, %B %-d, %Y')
          lines = [f'## Active Projects — {today}\n']
          lines.append('| Project | Status |')
          lines.append('|---------|--------|')
          for _, name, status in project_data:
              lines.append(f'| {name} | {status} |')
          lines.append('')
          OUT_FILE.write_text('\n'.join(lines))
          print(f'Status table written: {len(project_data)} projects')
        volumeMounts:
        - mountPath: /tmp/pai-daily
          name: workspace
        - mountPath: /projects
          name: projects
    - name: aggregate-email-tpl
      script:
        command:
        - bash
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              key: ANTHROPIC_API_KEY
              name: pai-claude-api-key
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              key: AWS_ACCESS_KEY_ID
              name: pai-aws-credentials
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: AWS_SECRET_ACCESS_KEY
              name: pai-aws-credentials
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              key: AWS_DEFAULT_REGION
              name: pai-aws-credentials
        image: 192.168.0.10:30500/pai-runner:latest
        source: "set -e\nSECTIONS_DIR=/workspace/sections\nPLAN_FILE=/workspace/DAY-PLAN.md\n\
          \necho \"# Day Plan — $(date '+%A, %B %-d, %Y')\" > $PLAN_FILE\necho \"\"\
          \ >> $PLAN_FILE\n\nfor f in $(ls $SECTIONS_DIR/*.md 2>/dev/null | sort);\
          \ do\n  cat \"$f\" >> $PLAN_FILE\n  echo -e \"\\n---\\n\" >> $PLAN_FILE\n\
          done\n\n# Write to projects dir\ncp $PLAN_FILE /projects/DAY-PLAN.md\n\n\
          # Email via AWS SES\npython3 /tmp/send_ses.py \"$PLAN_FILE\"\naws ses send-email\
          \ \\\n  --from rik@immutablesoftware.dev \\\n  --destination '{\"ToAddresses\"\
          :[\"andrew.myhre@gmail.com\"]}' \\\n  --message file:///tmp/email-msg.json\
          \ \\\n  --region us-east-1\n"
        volumeMounts:
        - mountPath: /workspace
          name: workspace
        - mountPath: /projects
          name: projects
        - mountPath: /tmp/send_ses.py
          name: ses-helper
          subPath: send_ses.py
    volumes:
    - hostPath:
        path: /tmp/pai-daily
        type: DirectoryOrCreate
      name: workspace
    - hostPath:
        path: /home/andrew/projects
        type: Directory
      name: projects
    - hostPath:
        path: /home/andrew/.claude
        type: Directory
      name: claude-home
    - configMap:
        name: pai-runner-dockerfile
      name: dockerfile-cm
    - configMap:
        name: pai-ses-helper
      name: ses-helper

