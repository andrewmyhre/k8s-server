apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alert-rules
  namespace: monitoring
data:
  rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: Infrastructure Alerts
        folder: Infrastructure
        interval: 1m
        rules:
          - uid: disk-usage-high
            title: "High Disk Usage (> 85%)"
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  editorMode: code
                  expr: '100 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"} * 100)'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 85
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - A
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  refId: C
                  type: threshold
            noDataState: NoData
            execErrState: Error
            for: 5m
            annotations:
              summary: "High disk usage on {{ $labels.instance }}"
              description: "Root filesystem usage is at {{ printf \"%.1f\" $values.A.Value }}% (threshold: 85%)"
            labels:
              severity: warning
            isPaused: false
