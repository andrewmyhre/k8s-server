# huddle-deployer
#
# ServiceAccount used by the Woodpecker CI pipeline (.woodpecker/build-deploy.yml
# in andrewmyhre/huddle) to run `helm upgrade --atomic` against the `huddle`
# namespace.
#
# ── Scope (narrowed 2026-04-22) ──────────────────────────────────────────────
# Previously bound to cluster-admin because the chart shipped a cluster-scoped
# PersistentVolume (huddle-data) and must create ClusterRole/ClusterRoleBinding
# for the huddle-agent impersonation model. The PV has since been split out of
# the chart (infra/bootstrap/huddle-data-pv.yaml, applied once per cluster), so
# the deployer no longer needs to manage PVs.
#
# What the chart still makes cluster-scoped:
#   - Namespace `huddle`         (created on first install)
#   - ClusterRole huddle-agent           } the impersonation-based agent
#   - ClusterRole huddle-project-agent   } security model in agent-rbac.yaml
#   - ClusterRoleBinding huddle-agent    }
#
# Note on privilege escalation: K8s RBAC requires the requester to hold either
# (a) every verb/resource combo it grants, OR (b) the `escalate` verb on the
# {cluster,}roles resource. We take option (b) — a single `escalate` verb
# rather than mirroring the chart's sensitive permissions (impersonate,
# cross-apiGroup create/update) cluster-wide onto the deployer. This keeps the
# blast radius of a stolen token scoped to the `huddle` namespace admin bundle
# + RBAC management, rather than effectively granting workload-admin across the
# whole cluster.
#
# Token delivery is unchanged: the SA's long-lived token Secret (huddle-
# deployer-token, below) is packed into a kubeconfig and sealed as
# `woodpecker-huddle-kubeconfig` in the woodpecker namespace; the pipeline
# mounts it at /root/.kube/config.
#
# This file is part of the homelab repo (/projects/homelab/k8s-apps/woodpecker/).

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: huddle-deployer
  namespace: woodpecker
  labels:
    app.kubernetes.io/component: ci-deployer
    app.kubernetes.io/part-of: woodpecker
    app.kubernetes.io/target: huddle

---
# Long-lived API token for the huddle-deployer ServiceAccount.
# The controller will populate .data.token and .data.ca.crt after apply.
# This is the documented way to get stable SA tokens in k8s >= 1.24
# (previously auto-created, now you must request them explicitly).
apiVersion: v1
kind: Secret
metadata:
  name: huddle-deployer-token
  namespace: woodpecker
  annotations:
    kubernetes.io/service-account.name: huddle-deployer
  labels:
    app.kubernetes.io/component: ci-deployer
    app.kubernetes.io/part-of: woodpecker
type: kubernetes.io/service-account-token

---
# Namespace-scoped: full admin within the `huddle` namespace.
# Covers every Deployment/Service/Ingress/ConfigMap/Secret/PVC/SA/Role/
# RoleBinding the chart creates inside the namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: huddle-deployer-admin
  namespace: huddle
  labels:
    app.kubernetes.io/component: ci-deployer
    app.kubernetes.io/part-of: woodpecker
    app.kubernetes.io/target: huddle
subjects:
  - kind: ServiceAccount
    name: huddle-deployer
    namespace: woodpecker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin

---
# Cluster-scoped minimum: the narrow set of cluster-scoped verbs helm needs
# to render the chart. This is deliberately a single ClusterRole so it's easy
# to diff against `infra/helm/huddle/templates/agent-rbac.yaml`.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: huddle-deployer
  labels:
    app.kubernetes.io/component: ci-deployer
    app.kubernetes.io/part-of: woodpecker
    app.kubernetes.io/target: huddle
rules:
  # ── Chart-rendered cluster-scoped objects ───────────────────────────────
  # Namespace: chart's templates/namespace.yaml
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # ClusterRoles + ClusterRoleBindings: chart's templates/agent-rbac.yaml
  # `bind` + `escalate` let helm upgrade refresh the agent's bindings/roles
  # without the deployer itself holding every verb the chart grants.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "bind", "escalate"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: huddle-deployer
  labels:
    app.kubernetes.io/component: ci-deployer
    app.kubernetes.io/part-of: woodpecker
    app.kubernetes.io/target: huddle
subjects:
  - kind: ServiceAccount
    name: huddle-deployer
    namespace: woodpecker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: huddle-deployer
