# Kibana helm values — connects to co-located Elasticsearch
# Chart: elastic/kibana v8.5.1
# Namespace: monitoring
# Install:
#   helm install kibana elastic/kibana \
#     --namespace monitoring --version 8.5.1 \
#     --values monitoring/kibana-values.yaml --timeout 5m

elasticsearchHosts: "http://elasticsearch-master.monitoring.svc.cluster.local:9200"

# Dummy cert secret — security is disabled on Elasticsearch, but chart requires a secret name
elasticsearchCertificateSecret: "elasticsearch-master-certs"
elasticsearchCertificateAuthoritiesFile: "ca.crt"

kibanaConfig:
  kibana.yml: |
    server.host: "0.0.0.0"
    xpack.encryptedSavedObjects.encryptionKey: "homelab-32-char-encryption-key!!"

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

# No ingress via Helm — managed separately in kibana-ingress.yaml
ingress:
  enabled: false
