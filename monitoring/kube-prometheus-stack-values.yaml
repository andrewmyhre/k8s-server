# kube-prometheus-stack helm values
# Chart: prometheus-community/kube-prometheus-stack v82.5.0
# Namespace: monitoring
# Install:
#   helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     --values monitoring/kube-prometheus-stack-values.yaml --timeout 10m
# Upgrade:
#   helm upgrade kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace monitoring \
#     --values monitoring/kube-prometheus-stack-values.yaml --timeout 10m

grafana:
  adminPassword: admin  # Change after first login
  # initChownData runs as root with only CAP_CHOWN (no CAP_DAC_OVERRIDE).
  # Grafana creates png/csv/pdf subdirs as 700, which root can't traverse
  # without DAC_OVERRIDE. Data is already owned by UID 472, so skip this.
  initChownData:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  sidecar:
    dashboards:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
    datasources:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.immutablesoftware.dev
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  # Inject SMTP credentials as env vars (GF_SMTP_USER, GF_SMTP_PASSWORD).
  # grafana chart key: envFromSecret (single string, not envFrom list).
  envFromSecret: grafana-alerting-credentials

  grafana.ini:
    server:
      root_url: "https://grafana.immutablesoftware.dev"
    # Amazon SES SMTP relay (us-east-1). Credentials from envFromSecret above.
    smtp:
      enabled: true
      host: email-smtp.us-east-1.amazonaws.com:587
      user: $__env{GF_SMTP_USER}
      password: $__env{GF_SMTP_PASSWORD}
      from_address: alerts@immutablesoftware.dev
      from_name: Grafana Alerts
      startTLS_policy: MandatoryStartTLS

  # Grafana 12 alerting provisioning does not support env var substitution in
  # contact point settings. Strategy: the grafana chart creates an emptyDir at
  # /etc/grafana/provisioning/alerting/. An init container reads from the
  # SealedSecret (grafana-alerting-provisioning) and copies the decrypted YAML
  # files (with real Slack token embedded) into the emptyDir before Grafana starts.
  # extraContainerVolumes supports raw Kubernetes volume specs (via tpl).
  # extraVolumes has a limited type list and doesn't handle secret volumes.
  extraContainerVolumes:
    # Source: SealedSecret with real Slack token embedded in provisioning YAML
    - name: alerting-provisioning-source
      secret:
        secretName: grafana-alerting-provisioning
    # Source: ConfigMap with non-sensitive alert rules
    - name: alerting-rules
      configMap:
        name: grafana-alert-rules
    # Dest: emptyDir populated by init container, read by Grafana at startup
    - name: alerting-provisioning
      emptyDir: {}
    # Source: SealedSecret with InfluxDB datasource provisioning (password embedded)
    - name: influxdb-datasource-source
      secret:
        secretName: grafana-influxdb-datasource

  extraVolumeMounts:
    - name: alerting-provisioning
      mountPath: /etc/grafana/provisioning/alerting

  extraInitContainers:
    - name: copy-alerting-provisioning
      image: busybox:1.36
      command:
        - sh
        - -c
        - cp /src/*.yaml /dest/ && cp /rules/*.yaml /dest/ && echo "Alerting provisioning files copied:" && ls /dest/
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
      volumeMounts:
        - name: alerting-provisioning-source
          mountPath: /src
          readOnly: true
        - name: alerting-rules
          mountPath: /rules
          readOnly: true
        - name: alerting-provisioning
          mountPath: /dest
    - name: copy-influxdb-datasource
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          # Copy InfluxDB datasource from SealedSecret (has real password embedded)
          # into the sidecar's datasource emptyDir (sc-datasources-volume).
          # The sidecar will add Prometheus/Alertmanager/Loki from ConfigMaps.
          cp /influxdb-src/*.yaml /datasources/
          echo "InfluxDB datasource provisioning copied:" && ls /datasources/
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
      volumeMounts:
        - name: influxdb-datasource-source
          mountPath: /influxdb-src
          readOnly: true
        - name: sc-datasources-volume
          mountPath: /datasources

  # InfluxDB datasource is provisioned separately via SealedSecret +
  # init container (grafana-influxdb-datasource secret) because Grafana's
  # env var substitution in secureJsonData is broken in this version.
  deleteDatasources:
    - name: Home Assistant (InfluxDB)
      orgId: 1
    - name: InfluxDB - Home Assistant
      orgId: 1

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy

prometheus:
  prometheusSpec:
    retention: 30d
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

kubeStateMetrics:
  enabled: true

kube-state-metrics:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 256Mi

nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
