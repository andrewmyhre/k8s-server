# Loki helm values — single-binary mode for single-node homelab
# Chart: grafana/loki v6.53.0
# Namespace: monitoring
# Install:
#   helm install loki grafana/loki \
#     --namespace monitoring --create-namespace \
#     --values monitoring/loki-values.yaml --timeout 5m

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 20Gi

# Disable multi-component mode (not needed for single-binary)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

gateway:
  replicas: 0

minio:
  enabled: false

resultsCache:
  enabled: false

chunksCache:
  enabled: false

lokiCanary:
  enabled: true
