# Loki values — single-binary mode for homelab single-node
# Chart: grafana/loki
# Install: helm install loki grafana/loki \
#            --namespace monitoring \
#            --values loki-values.yaml --timeout 5m

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 20Gi

# Disable distributed mode components
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  replicas: 0

minio:
  enabled: false

# Canary verifies loki is working end-to-end
lokiCanary:
  enabled: true

chunksCache:
  enabled: false
resultsCache:
  enabled: false
