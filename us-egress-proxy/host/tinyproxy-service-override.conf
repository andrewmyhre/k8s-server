# systemd drop-in for tinyproxy.service
#
# Installed at /etc/systemd/system/tinyproxy.service.d/override.conf by
# install.sh. Forces tinyproxy to use our custom resolv.conf (pointing at
# public DNS at 1.1.1.1) instead of the host's resolv.conf (which points
# at Mullvad's in-tunnel resolver, unreachable once our nft rule sends
# tinyproxy's packets outside the tunnel).
#
# BindReadOnlyPaths mounts the source file over /etc/resolv.conf only
# inside tinyproxy's mount namespace. The host's real /etc/resolv.conf
# is untouched for everything else.

[Service]
BindReadOnlyPaths=/etc/us-egress-proxy/resolv.conf:/etc/resolv.conf
