# Custom /etc/resolv.conf mounted into the tinyproxy service ONLY via a
# systemd BindReadOnlyPaths drop-in (see tinyproxy-service-override.conf).
#
# Why: the host's real /etc/resolv.conf points at systemd-resolved's stub
# (127.0.0.53), which forwards to Mullvad's in-tunnel DNS at 10.64.0.1.
# Our nft rule marks every tinyproxy packet so it bypasses the Mullvad
# tunnel — but that means 10.64.0.1 is unreachable from tinyproxy, so
# systemd-resolved's upstream queries would never return.
#
# Pointing tinyproxy at 1.1.1.1 / 1.0.0.1 (Cloudflare anycast, reachable
# over the public internet via the ISP path) sidesteps that entirely.
#
# This override only affects tinyproxy's mount namespace. Everything else
# on the host continues to resolve via systemd-resolved + Mullvad DNS.

nameserver 1.1.1.1
nameserver 1.0.0.1
options timeout:2 attempts:2
