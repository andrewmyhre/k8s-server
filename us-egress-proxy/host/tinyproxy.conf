# tinyproxy config for us-egress-proxy
#
# This proxy runs on sleeper-service (192.168.0.10) and its outbound traffic
# is marked by /etc/nftables.d/us-egress-proxy-bypass.nft with Mullvad's "mole"
# marks, which causes Mullvad to route the packets outside the WireGuard tunnel.
#
# Net effect: pods that send traffic through this proxy egress via the ISP
# (US IP), bypassing the Sweden VPN exit.
#
# The proxy binds to 192.168.0.10 (LAN IP) only — it is NOT reachable from
# the internet. Basic auth is still required as a second line of defense.

User tinyproxy
Group tinyproxy

Port 8888

# Bind to LAN IP only. Never use 0.0.0.0 — we do not want this exposed
# outside the LAN / pod network even by accident.
Listen 192.168.0.10

# No outbound source bind — let the kernel pick. Mullvad routing (via our nft
# marks) will send these packets out enp42s0, not wg0-mullvad.

Timeout 600

DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatFile         "/usr/share/tinyproxy/stats.html"

LogFile  "/var/log/tinyproxy/tinyproxy.log"
LogLevel Info

PidFile "/run/tinyproxy/tinyproxy.pid"

MaxClients 50

# --- Access control ---------------------------------------------------------
# Allow LAN + k8s pod network + k8s service network. Deny everything else.
# (tinyproxy's default when no Allow lines are present is to allow all, so we
# must be explicit.)
Allow 127.0.0.1
Allow 192.168.0.0/16
Allow 10.0.0.0/24
Allow 10.96.0.0/12

# --- Basic auth -------------------------------------------------------------
# Replace PLACEHOLDER_PASSWORD during install with the same password that is
# sealed into the k8s SealedSecret. install.sh handles this.
BasicAuth proxyuser PLACEHOLDER_PASSWORD

# Only allow CONNECT to HTTPS (443). Stops the proxy being used as a generic
# TCP tunnel to arbitrary ports.
ConnectPort 443

# Disable "Via" header so the upstream API can't trivially detect proxy usage.
DisableViaHeader Yes

# Hide the proxy's existence in error pages.
XTinyproxy No
